name: dar_shams_mobile
description: "تطبيق أهالي مقيمي دار شمس التعافي"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  supabase_flutter: ^2.5.0
  flutter_secure_storage: ^9.0.0
  google_fonts: ^6.2.1
  lucide_icons: ^0.1.2
  intl: ^0.19.0
  url_launcher: ^6.2.5
  cached_network_image: ^3.3.1
  flutter_spinkit: ^5.2.1
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
